server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/bbs?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
    username: bbs_user
    password: your_password    # 改为第3步设置的密码
    driver-class-name: com.mysql.cj.jdbc.Driver

mybatis:
  configuration:
    map-underscore-to-camel-case: true
    # 生产环境关闭SQL日志输出，提升性能
    # log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

jwt:
  secret: bbs-system-jwt-secret-key-2024-must-be-at-least-256-bits-long-for-hs256
  expiration: 7200000